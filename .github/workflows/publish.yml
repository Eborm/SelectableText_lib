name: Publish NuGet Package
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: |
          dotnet build SelectableText_lib/SelectableText_lib_namespace.csproj --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack SelectableText_lib/SelectableText_lib_namespace.csproj --configuration Release --no-build --output ./nupkgs -p:PackageVersion=${{ github.ref_name }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
